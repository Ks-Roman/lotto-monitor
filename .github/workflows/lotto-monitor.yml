name: Lottery Monitor

on:
  schedule:
    # Запускать каждые 30 минут
    - cron: '*/30 * * * *'
  workflow_dispatch: # Возможность запуска вручную со вкладки Actions

jobs:
  check-lottery:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run lottery monitor script
        run: python lottery_monitor.py

      - name: Save results
        uses: actions/upload-artifact@v3
        with:
          name: lottery-results
          path: sequence_backup.txt
