name: Lottery Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check-lottery:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run lottery monitor script
        run: python lottery_monitor.py

      - name: Save results
        uses: actions/upload-artifact@v4  # ← Вот это главное изменение: v4 вместо v3
        with:
          name: lottery-results
          path: sequence_backup.txt
